name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
            pkg_config_path: /usr/lib/aarch64-linux-gnu/pkgconfig
          - goos: darwin
            goarch: amd64
            runner: macos-13
          - goos: darwin
            goarch: arm64
            runner: macos-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install deps (Linux amd64)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libflac-dev libvorbis-dev libogg-dev

      - name: Install deps (Linux arm64 cross)
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          sudo dpkg --add-architecture arm64
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i '/^Types:/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          fi
          sudo sed -i 's/^deb \(http\)/deb [arch=amd64] \1/' /etc/apt/sources.list || true
          CODENAME=$(lsb_release -cs)
          sudo tee /etc/apt/sources.list.d/arm64-ports.list > /dev/null <<EOF
          deb [arch=arm64] http://ports.ubuntu.com/ ${CODENAME} main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ ${CODENAME}-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ ${CODENAME}-security main restricted universe multiverse
          EOF
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libasound2-dev:arm64 libflac-dev:arm64 libvorbis-dev:arm64 libogg-dev:arm64

      - name: Install deps (macOS)
        if: matrix.goos == 'darwin'
        run: brew install flac libvorbis libogg pkg-config

      - name: Build with GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: build --single-target --clean
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc || '' }}
          PKG_CONFIG_PATH: ${{ matrix.pkg_config_path || '' }}

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Compute GoReleaser skip flags
        id: flags
        run: |
          SKIP=""
          [ -z "$AUR_KEY" ] && SKIP="$SKIP --skip=aur"
          echo "extra=${SKIP}" >> "$GITHUB_OUTPUT"
        env:
          AUR_KEY: ${{ secrets.AUR_KEY }}

      - name: Release with GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --skip=build ${{ steps.flags.outputs.extra }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUR_KEY: ${{ secrets.AUR_KEY }}

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download checksums
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          curl -sL "https://github.com/${{ github.repository }}/releases/download/${TAG}/checksums.txt" -o checksums.txt
          cat checksums.txt

          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "SHA_DARWIN_ARM64=$(grep 'cliamp-darwin-arm64\.tar\.gz' checksums.txt | awk '{print $1}')" >> $GITHUB_ENV
          echo "SHA_DARWIN_AMD64=$(grep 'cliamp-darwin-amd64\.tar\.gz' checksums.txt | awk '{print $1}')" >> $GITHUB_ENV
          echo "SHA_LINUX_ARM64=$(grep 'cliamp-linux-arm64\.tar\.gz' checksums.txt | awk '{print $1}')" >> $GITHUB_ENV
          echo "SHA_LINUX_AMD64=$(grep 'cliamp-linux-amd64\.tar\.gz' checksums.txt | awk '{print $1}')" >> $GITHUB_ENV

      - name: Generate and push formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
        run: |
          # Resolve tap repo:
          # 1. HOMEBREW_TAP_REPO variable (set in repo Settings → Variables)
          # 2. homebrew-cliamp (maintainer's dedicated tap, if it exists)
          # 3. homebrew-tap (general fallback)
          if [ -n "${HOMEBREW_TAP_REPO}" ]; then
            TAP_REPO="${HOMEBREW_TAP_REPO}"
          elif curl -sf -H "Authorization: Bearer ${GH_TOKEN}" \
               "https://api.github.com/repos/${REPO_OWNER}/homebrew-cliamp" > /dev/null; then
            TAP_REPO="homebrew-cliamp"
          else
            TAP_REPO="homebrew-tap"
          fi
          echo "Using tap: ${REPO_OWNER}/${TAP_REPO}"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${REPO_OWNER}/${TAP_REPO}.git"
          cd "${TAP_REPO}"
          mkdir -p Formula

          cat > Formula/cliamp.rb << FORMULA
          class Cliamp < Formula
            desc "A retro terminal music player inspired by Winamp 2.x"
            homepage "https://github.com/${GITHUB_REPOSITORY}"
            version "${VERSION}"
            license "MIT"

            depends_on "ffmpeg" => :recommended
            depends_on "yt-dlp" => :recommended

            on_macos do
              on_arm do
                url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/cliamp-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/cliamp-darwin-amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/cliamp-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/cliamp-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "cliamp"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/cliamp --version")
            end
          end
          FORMULA

          sed -i 's/^          //' Formula/cliamp.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cliamp.rb
          git commit -m "Update cliamp to ${VERSION}"
          git push
